name: iOS Build (unsigned)

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.2.0
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build (unsigned, no code signing)
        working-directory: ios
        run: |
          xcodebuild \
            -workspace TestApp.xcworkspace \
            -scheme TestApp \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
